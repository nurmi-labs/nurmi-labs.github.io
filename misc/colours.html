<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linguist</title>

    <link href="https://cloudflare.com" rel="stylesheet" />
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            color: #24292f;
        }
        h1 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 10px;
            color: #1f2328;
        }
        pre[class*="language-"] {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background-color: #f6f8fa !important;
            padding: 16px;
            overflow-x: auto; 
        }
    </style>
</head>
<body>

    <h1>Labels</h1>
    <p>colours.txt</p>

    <pre class="language-plaintext"><code class="language-plaintext">
Awk        #c30e9b
Csharp     #7355dd
Elisp      #c065db
Haskell    #5e5086
Java       #b07219
Julia      #a270ba
Python     #3572A5
Scheme     #1e4aec
TeX        #3D6117
TypeScript #3178c6</code></pre>

    <script src="https://cloudflare.com"></script>
    
    <script src="https://cloudflare.com"></script>

</body>
</html>
